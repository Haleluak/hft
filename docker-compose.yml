version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: hft_redis
    ports:
      - "6379:6379"
    restart: always

  questdb:
    image: questdb/questdb:latest
    container_name: hft_questdb
    ports:
      - "9000:9000" # REST API & Web UI
      - "9009:9009" # InfluxDB line protocol (ILP)
      - "8812:8812" # PostgreSQL wire protocol
      - "9004:9004" # ILP Health check 
    restart: always

  exchange:
    build: .
    container_name: hft_exchange
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - QUESTDB_ADDR=questdb:9009
    depends_on:
      - redis
      - questdb
    privileged: true # needed for raw epoll access on some hosts (optional)
    restart: unless-stopped
